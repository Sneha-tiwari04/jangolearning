{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Site{% endblock %}</title>

  <!-- Tailwind CDN (for quick prototyping) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="icon" href="{% static 'images/logo.png' %}">
</head>
<body>
  <nav class="w-full bg-white shadow-sm fixed top-0 left-0 z-50">
    <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
      <div class="flex items-center gap-3">
        <img src="{% static 'images/logo.png' %}" class="h-10 w-10 rounded" />
        <span class="text-2xl font-bold text-red-500">Zomato</span>
      </div>

      <ul class="hidden md:flex gap-6 text-lg font-medium">
        <li class="hover:text-red-500 cursor-pointer">Home</li>
        <li class="hover:text-red-500 cursor-pointer">Order Online</li>
        <li class="hover:text-red-500 cursor-pointer">Dining</li>
        <li class="hover:text-red-500 cursor-pointer">About</li>
      </ul>

      <div class="flex items-center gap-4">
        <button class="text-gray-700 hover:text-red-500">Login</button>
        <button class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
          Sign Up
        </button>
      </div>
    </div>
  </nav>

  {% block content %}

  {% endblock %}
</body>
</html>
